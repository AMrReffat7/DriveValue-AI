<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveValue AI | Egyptian Car Value Analyzer</title>
    <!-- Google Fonts: Inter and Rajdhani for a technical, modern feel -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for automotive icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Decorative background element */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1920') no-repeat center center;
            background-size: cover;
            opacity: 0.15;
            z-index: -1;
            filter: grayscale(100%) brightness(0.5);
        }

        .container {
            width: 100%;
            max-width: 900px;
            z-index: 1;
            margin-bottom: 40px;
            /* Space for the new section */
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header h1 i {
            -webkit-text-fill-color: var(--primary);
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        .header p {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group label i {
            font-size: 0.9rem;
            color: var(--primary);
        }

        input,
        select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        select option {
            background: var(--bg-dark);
            color: white;
        }

        .analyze-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(59, 130, 246, 0.5);
            filter: brightness(1.1);
        }

        .analyze-btn:active {
            transform: translateY(0);
        }

        #result {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid var(--glass-border);
            display: none;
            /* Hidden until analysis */
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .rating-badge {
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rating-buy {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .rating-hold {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .rating-avoid {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .vrs-meter {
            text-align: right;
        }

        .vrs-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .vrs-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
        }

        .stat-value.highlight {
            color: var(--primary);
        }

        .explanation-text {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .forecast-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 24px;
        }

        .forecast-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .forecast-item {
            text-align: center;
            padding: 15px;
            border-right: 1px solid var(--glass-border);
        }

        .forecast-item:last-child {
            border-right: none;
        }

        .forecast-year {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 5px;
        }

        .forecast-price {
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
        }

        .reliable-cars-section {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-top: 40px;
        }

        .reliable-cars-section h2 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0;
            margin-bottom: 30px;
            color: var(--primary);
            text-align: center;
        }

        .reliable-cars-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .reliable-cars-table th,
        .reliable-cars-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        .reliable-cars-table th {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .reliable-cars-table tbody tr:last-child td {
            border-bottom: none;
        }

        .reliable-cars-table tbody tr:hover {
            background-color: rgba(59, 130, 246, 0.05);
        }

        @media (max-width: 640px) {
            .header h1 {
                font-size: 2rem;
            }

            .main-card {
                padding: 24px;
            }

            .forecast-grid {
                grid-template-columns: 1fr;
            }

            .forecast-item {
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
            }

            .forecast-item:last-child {
                border-bottom: none;
            }

            .result-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            .vrs-meter {
                text-align: left;
            }

            .reliable-cars-section {
                padding: 24px;
            }

            .reliable-cars-section h2 {
                font-size: 1.5rem;
            }

            .reliable-cars-table th,
            .reliable-cars-table td {
                padding: 8px 10px;
                font-size: 0.8rem;
            }
        }

        /* Animation for results */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-reveal {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-car-side"></i> DRIVEVALUE AI</h1>
            <p>Advanced Egyptian Vehicle Valuation & Investment Analytics</p>
        </header>

        <main class="main-card">
            <div class="input-grid">
                <div class="input-group">
                    <label><i class="fas fa-industry"></i> Make</label>
                    <select id="make"></select>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-car"></i> Model</label>
                    <select id="model"></select>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-calendar-alt"></i> Model Year</label>
                    <input id="year" type="number" value="2020" min="1900" max="2027">
                </div>

                <div class="input-group">
                    <label><i class="fas fa-tachometer-alt"></i> Mileage (KM)</label>
                    <input id="mileage" type="number" placeholder="e.g. 50000">
                </div>

                <div class="input-group">
                    <label><i class="fas fa-tags"></i> Listing Price (EGP)</label>
                    <input id="listing_price" type="number" placeholder="e.g. 850000">
                </div>

                <div class="input-group">
                    <label><i class="fas fa-gas-pump"></i> Fuel Type</label>
                    <select id="fuel">
                        {% for f in fuels %}
                        <option>{{f}}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-shapes"></i> Body Type</label>
                    <select id="body">
                        {% for b in bodies %}
                        <option>{{b}}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-map-marker-alt"></i> Governorate</label>
                    <select id="gov">
                        {% for g in governorates %}
                        <option>{{g}}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-cog"></i> Transmission</label>
                    <select id="trans">
                        {% for t in transmissions %}
                        <option>{{t}}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button class="analyze-btn" onclick="predictCar()">
                <i class="fas fa-microchip"></i> Run Deep Analysis
            </button>

            <div id="result">
                <!-- Results will be injected here -->
            </div>
        </main>
    </div>

    <div class="reliable-cars-section">
        <h2><i class="fas fa-award"></i> Top Retention Vehicles</h2>
        <table class="reliable-cars-table">
            <thead>
                <tr>
                    <th>Make</th>
                    <th>Model</th>
                    <th>VRS</th>
                    <th>Annual Retention</th>
                </tr>
            </thead>
            <tbody>
                {% for car in most_reliable_cars %}
                <tr>
                    <td>{{ car.Make }}</td>
                    <td>{{ car.Model }}</td>
                    <td>{{ car.VRS | round(2) }}</td>
                    <td>{{ car.annual_retention_pct | round(2) }}%</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script>
        // Mock data for template variables (will be replaced by Flask/Jinja)
        const modelsByMake = {{ models | tojson }};
        const makes = {{ makes | tojson }};

        const makeSelect = document.getElementById("make");
        const modelSelect = document.getElementById("model");

        // Populate makes
        for (const make of makes) {
            const option = document.createElement("option");
            option.value = make;
            option.text = make;
            makeSelect.appendChild(option);
        }

        function updateModels() {
            modelSelect.innerHTML = "";
            const selectedMake = makeSelect.value;
            const modelList = modelsByMake[selectedMake] || [];

            for (const model of modelList) {
                const option = document.createElement("option");
                option.value = model;
                option.text = model;
                modelSelect.appendChild(option);
            }
        }

        makeSelect.addEventListener("change", updateModels);
        updateModels();

        async function predictCar() {
            const btn = document.querySelector(".analyze-btn");
            const originalContent = btn.innerHTML;

            // Loading state
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Analyzing...';
            btn.disabled = true;

            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        make: makeSelect.value,
                        model: modelSelect.value,
                        year: document.getElementById("year").value,
                        mileage: document.getElementById("mileage").value,
                        listing_price: document.getElementById("listing_price").value,
                        fuel: document.getElementById("fuel").value,
                        body: document.getElementById("body").value,
                        gov: document.getElementById("gov").value,
                        trans: document.getElementById("trans").value
                    })
                });

                const data = await response.json();
                renderResults(data);
            } catch (error) {
                console.error("Analysis failed:", error);
                alert("Connection error. Please check if the server is running.");
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        function renderResults(data) {
            const resultDiv = document.getElementById("result");
            resultDiv.style.display = "block";
            resultDiv.classList.add("animate-reveal");

            let ratingClass = "rating-hold";
            let ratingIcon = "fa-hand-paper";

            if (data.investment.rating === "Buy") {
                ratingClass = "rating-buy";
                ratingIcon = "fa-check-circle";
            } else if (data.investment.rating === "Avoid") {
                ratingClass = "rating-avoid";
                ratingIcon = "fa-exclamation-triangle";
            }

            resultDiv.innerHTML = `
                <div class="result-header">
                    <div class="rating-badge ${ratingClass}">
                        <i class="fas ${ratingIcon}"></i> ${data.investment.rating}
                    </div>
                    <div class="vrs-meter">
                        <div class="vrs-value">${data.investment.VRS}</div>
                        <div class="vrs-label">Retention Score</div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Investment Grade</div>
                        <div class="stat-value highlight">${data.investment.grade}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Fair Value Est.</div>
                        <div class="stat-value">${data.investment.fair_value_estimate.toLocaleString()} EGP</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Market Variance</div>
                        <div class="stat-value" style="color: ${data.investment["listing_vs_fair_value_%"] > 0 ? 'var(--danger)' : 'var(--accent)'}">
                            ${data.investment["listing_vs_fair_value_%"] > 0 ? '+' : ''}${data.investment["listing_vs_fair_value_%"]}% 
                        </div>
                    </div>
                    ${data.prediction ? `
                    <div class="stat-card">
                        <div class="stat-label">Confidence Range</div>
                        <div class="stat-value" style="font-size: 1rem;">
                            ${Math.round(data.prediction.low).toLocaleString()} - ${Math.round(data.prediction.high).toLocaleString()}
                        </div>
                    </div>
                    ` : ""}
                </div>

                <div class="explanation-text">
                    ${data.explanation}
                </div>

                <div class="forecast-section">
                    <div class="forecast-title"><i class="fas fa-chart-line"></i> Future Value Forecast</div>
                    <div class="forecast-grid">
                        <div class="forecast-item">
                            <div class="forecast-year">3 Years</div>
                            <div class="forecast-price">${Math.round(data.future_values["3"].predicted).toLocaleString()} EGP</div>
                        </div>
                        <div class="forecast-item">
                            <div class="forecast-year">5 Years</div>
                            <div class="forecast-price">${Math.round(data.future_values["5"].predicted).toLocaleString()} EGP</div>
                        </div>
                        <div class="forecast-item">
                            <div class="forecast-year">10 Years</div>
                            <div class="forecast-price">${Math.round(data.future_values["10"].predicted).toLocaleString()} EGP</div>
                        </div>
                    </div>
                </div>
            `;

            // Scroll to results
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>

</html>
